<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen Monitor</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous">
  <script src="/socket.io/socket.io.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    /* Speed up GLightbox animations */
    .glightbox-container .gslide,
    .glightbox-container .goverlay,
    .glightbox-container .gcontainer {
      animation-duration: 0.15s !important;
      transition-duration: 0.15s !important;
    }
    :root {
      --card-bg:     #0f172a;
      --card-border: #1e3a5f;
      --header-bg:   #1e293b;
      --flash-color: #22c55e;
    }

    body { background: #020617; }

    .monitor-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color .15s, box-shadow .15s;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .monitor-card.flash {
      border-color: var(--flash-color);
      box-shadow: 0 0 14px rgba(34,197,94,.35);
    }

    .monitor-card .card-header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--card-border);
      padding: .45rem .75rem;
    }

    .folder-label {
      font-size: .95rem;
      font-weight: 600;
      color: #e2e8f0;
      cursor: pointer;
      border-radius: 4px;
      padding: 1px 4px;
      transition: background .15s;
    }

    .folder-label:hover {
      background: rgba(255,255,255,.08);
    }

    .folder-label-input {
      font-size: .95rem;
      font-weight: 600;
      color: #e2e8f0;
      background: #0f172a;
      border: 1px solid #3b82f6;
      border-radius: 4px;
      padding: 1px 4px;
      outline: none;
      width: 100%;
      max-width: 220px;
    }

    .ts-label {
      font-size: .8rem;
      font-weight: 600;
      color: #94a3b8;
      font-variant-numeric: tabular-nums;
    }

    /* Image area: 4:3 minimum, widens to match image natural ratio */
    .img-wrap {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
      overflow: hidden;
      margin-block: auto;
    }

    .img-wrap.has-image {
      cursor: pointer;
    }

    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    .img-wrap .placeholder {
      padding: 2rem 0;
      color: #334155;
      font-size: .8rem;
      user-select: none;
    }

    /* Connection badge */
    #conn-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    #conn-badge.connected    .dot { background: #22c55e; }
    #conn-badge.disconnected .dot { background: #ef4444; }
    #conn-badge.connecting   .dot { background: #f59e0b; }

    .drag-handle {
      cursor: grab;
      color: #475569;
      padding: 0 6px 0 0;
      font-size: 1rem;
      line-height: 1;
      flex-shrink: 0;
    }
    .drag-handle:active { cursor: grabbing; }
    .drag-handle:hover  { color: #94a3b8; }

    .col-dragging { opacity: 0.35; }
    .col-drag-over > .monitor-card {
      outline: 2px dashed #3b82f6;
      outline-offset: 2px;
    }

    .hide-btn {
      background: none;
      border: none;
      color: #475569;
      padding: 0 0 0 8px;
      font-size: .95rem;
      cursor: pointer;
      line-height: 1;
      flex-shrink: 0;
    }
    .hide-btn:hover { color: #ef4444; }
  </style>
</head>
<body>
<div class="container-fluid py-3 px-4">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <h5 class="text-light mb-0">Screen Monitor</h5>
    <div class="d-flex align-items-center gap-2">
      <button id="manage-hidden-btn" class="btn btn-sm btn-outline-secondary d-none" onclick="toggleHiddenPanel()">
        <i class="bi bi-eye-slash-fill"></i> <span id="hidden-count">0</span> hidden
      </button>
      <div id="conn-badge" class="connecting d-flex align-items-center text-secondary small">
        <span class="dot"></span>
        <span id="conn-label">Connecting…</span>
      </div>
    </div>
  </div>

  <!-- Hidden screens panel -->
  <div id="hidden-panel" class="d-none mb-3 p-2 rounded" style="background:#1e293b;border:1px solid #1e3a5f">
    <div class="text-secondary small mb-2">Hidden screens — click to restore</div>
    <div id="hidden-list" class="d-flex flex-wrap gap-2"></div>
  </div>

  <!-- Cards are injected here, 3 per row on md+ screens -->
  <div class="row g-3" id="monitor-grid"></div>

</div>

<script>
  'use strict';

  const grid    = document.getElementById('monitor-grid');
  const badge   = document.getElementById('conn-badge');
  const connLbl = document.getElementById('conn-label');

  // folderNumber → true (tracks which cards exist)
  const knownFolders = {};

  // folderNumber → Date of last image update
  const lastUpdateTime = {};

  // Configured by server via 'config' event
  let flashSeconds = 5;
  let alertOnly    = false;

  // ── Relative time helper ────────────────────────────────────────────────────
  function timeAgo(date) {
    const secs = Math.floor((Date.now() - date) / 1000);
    if (secs < flashSeconds)  return 'just now';
    if (secs < 60) return `${secs}s ago`;
    const mins = Math.floor(secs / 60);
    if (mins < 60) return `${mins} min ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)  return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function refreshAllTimestamps() {
    for (const [folderNumber, date] of Object.entries(lastUpdateTime)) {
      const ts = document.getElementById(`ts-${folderNumber}`);
      if (ts) ts.textContent = timeAgo(date);
    }
  }

  setInterval(refreshAllTimestamps, 1_000);

  // ── Folder name map (persisted in localStorage) ─────────────────────────────
  const LS_KEY = 'folderNames';

  function loadFolderNames() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
  }

  let folderNames = loadFolderNames();

  function getFolderName(folderNumber) {
    return folderNames[folderNumber] || `Folder ${folderNumber}`;
  }

  function saveFolderName(folderNumber, name) {
    name = name.trim();
    if (name) {
      folderNames[folderNumber] = name;
    } else {
      delete folderNames[folderNumber];
    }
    localStorage.setItem(LS_KEY, JSON.stringify(folderNames));
    updateHiddenPanel(); // refresh names shown in hidden panel
  }

  // ── Hidden folders ──────────────────────────────────────────────────────────
  const LS_HIDDEN_KEY = 'hiddenFolders';
  const LS_ORDER_KEY  = 'folderOrder';

  function loadHiddenFolders() {
    try { return JSON.parse(localStorage.getItem(LS_HIDDEN_KEY)) || {}; } catch { return {}; }
  }

  let hiddenFolders = loadHiddenFolders();

  function isHidden(folderNumber) { return !!hiddenFolders[folderNumber]; }

  function saveHiddenFolders() {
    localStorage.setItem(LS_HIDDEN_KEY, JSON.stringify(hiddenFolders));
  }

  function hideCard(folderNumber) {
    hiddenFolders[folderNumber] = true;
    saveHiddenFolders();
    const col = grid.querySelector(`[data-folder="${folderNumber}"]`);
    if (col) col.style.display = 'none';
    updateHiddenPanel();
  }

  function showCard(folderNumber) {
    delete hiddenFolders[folderNumber];
    saveHiddenFolders();
    const col = grid.querySelector(`[data-folder="${folderNumber}"]`);
    if (col) col.style.display = '';
    updateHiddenPanel();
  }

  function updateHiddenPanel() {
    const hiddenKeys = Object.keys(hiddenFolders);
    const manageBtn  = document.getElementById('manage-hidden-btn');
    const countEl    = document.getElementById('hidden-count');
    const hiddenList = document.getElementById('hidden-list');
    if (!manageBtn) return;
    countEl.textContent = hiddenKeys.length;
    if (hiddenKeys.length > 0) {
      manageBtn.classList.remove('d-none');
    } else {
      manageBtn.classList.add('d-none');
      document.getElementById('hidden-panel').classList.add('d-none');
    }
    hiddenList.innerHTML = '';
    for (const fn of hiddenKeys) {
      const btn = document.createElement('button');
      btn.className = 'btn btn-sm btn-outline-primary';
      btn.innerHTML = `<i class="bi bi-eye"></i> ${getFolderName(fn)}`;
      btn.onclick = () => showCard(fn);
      hiddenList.appendChild(btn);
    }
  }

  function toggleHiddenPanel() {
    document.getElementById('hidden-panel').classList.toggle('d-none');
  }

  // ── Folder order ────────────────────────────────────────────────────────────
  function loadFolderOrder() {
    try { return JSON.parse(localStorage.getItem(LS_ORDER_KEY)) || []; } catch { return []; }
  }

  let folderOrder = loadFolderOrder();

  function saveFolderOrder() {
    folderOrder = [...grid.querySelectorAll('[data-folder]')].map(el => el.dataset.folder);
    localStorage.setItem(LS_ORDER_KEY, JSON.stringify(folderOrder));
  }

  function applyOrder() {
    const cols = [...grid.querySelectorAll('[data-folder]')];
    cols.sort((a, b) => {
      const ai = folderOrder.indexOf(a.dataset.folder);
      const bi = folderOrder.indexOf(b.dataset.folder);
      // Both in saved order → use saved positions
      if (ai !== -1 && bi !== -1) return ai - bi;
      // Only one known → known goes first
      if (ai !== -1) return -1;
      if (bi !== -1) return 1;
      // Neither known → numeric order
      const an = parseInt(a.dataset.folder, 10), bn = parseInt(b.dataset.folder, 10);
      return isNaN(an) || isNaN(bn) ? a.dataset.folder.localeCompare(b.dataset.folder) : an - bn;
    });
    cols.forEach(col => grid.appendChild(col));
  }

  // ── Drag and drop ───────────────────────────────────────────────────────────
  let dragSrc = null;

  function addDragHandlers(col) {
    const handle = col.querySelector('.drag-handle');
    if (handle) {
      // Only allow drag when initiated from the handle
      handle.addEventListener('mousedown', () => { col.draggable = true; });
    }

    col.addEventListener('dragstart', (e) => {
      dragSrc = col;
      setTimeout(() => col.classList.add('col-dragging'), 0);
      e.dataTransfer.effectAllowed = 'move';
    });

    col.addEventListener('dragend', () => {
      col.classList.remove('col-dragging');
      grid.querySelectorAll('.col-drag-over').forEach(el => el.classList.remove('col-drag-over'));
      col.draggable = false;
      dragSrc = null;
      saveFolderOrder();
    });

    col.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (dragSrc && col !== dragSrc) col.classList.add('col-drag-over');
    });

    col.addEventListener('dragleave', (e) => {
      if (!col.contains(e.relatedTarget)) col.classList.remove('col-drag-over');
    });

    col.addEventListener('drop', (e) => {
      e.preventDefault();
      col.classList.remove('col-drag-over');
      if (!dragSrc || dragSrc === col) return;
      const allCols = [...grid.children];
      const srcIdx  = allCols.indexOf(dragSrc);
      const dstIdx  = allCols.indexOf(col);
      grid.insertBefore(dragSrc, srcIdx < dstIdx ? col.nextSibling : col);
    });
  }

  // ── Connection status ───────────────────────────────────────────────────────
  function setStatus(state, text) {
    badge.className = `${state} d-flex align-items-center small`;
    badge.classList.add(state === 'connected' ? 'text-success' : state === 'disconnected' ? 'text-danger' : 'text-warning');
    connLbl.textContent = text;
  }

  // ── Card creation ───────────────────────────────────────────────────────────
  function createCard(folderNumber) {
    const col = document.createElement('div');
    col.className = 'col-12 col-md-4';
    col.dataset.folder = folderNumber;
    col.innerHTML = `
      <div class="monitor-card" id="card-${folderNumber}">
        <div class="card-header d-flex justify-content-between align-items-center">
          <div class="d-flex align-items-center flex-grow-1 overflow-hidden">
            <span class="drag-handle" title="Drag to reorder"><i class="bi bi-grip-vertical"></i></span>
            <span class="folder-label" id="lbl-${folderNumber}" title="Click to rename">${getFolderName(folderNumber)}</span>
          </div>
          <div class="d-flex align-items-center">
            <span class="ts-label" id="ts-${folderNumber}">—</span>
            <button class="hide-btn" title="Hide card"><i class="bi bi-eye-slash"></i></button>
          </div>
        </div>
        <div class="img-wrap" id="wrap-${folderNumber}">
          <img id="img-${folderNumber}" alt="screenshot">
          <span class="placeholder" id="ph-${folderNumber}">No image yet</span>
        </div>
      </div>`;

    grid.appendChild(col);
    knownFolders[folderNumber] = true;

    if (isHidden(folderNumber)) {
      col.style.display = 'none';
      updateHiddenPanel();
    }

    applyOrder();
    addDragHandlers(col);

    // Inline rename on click
    const lbl = col.querySelector(`#lbl-${folderNumber}`);
    lbl.addEventListener('click', () => startRename(folderNumber));

    // Hide button
    col.querySelector('.hide-btn').addEventListener('click', () => hideCard(folderNumber));

    // Image preview on click
    const wrap = col.querySelector(`#wrap-${folderNumber}`);
    wrap.addEventListener('click', () => {
      const imgEl = document.getElementById(`img-${folderNumber}`);
      if (!imgEl || imgEl.style.display === 'none' || !imgEl.src) return;
      const filename = decodeURIComponent(imgEl.src.split('/').pop().split('?')[0]);
      const lb = GLightbox({
        elements: [{
          href: imgEl.src,
          type: 'image',
          title: `<span style="font-size:1.15rem;font-weight:700">${getFolderName(folderNumber)}</span>`,
          description: `<span style="font-size:.8rem;opacity:.7">${filename}</span>`,
        }],
        touchNavigation: true,
        keyboardNavigation: true,
        closeButton: true,
        zoomable: true,
        openEffect: 'zoom',
        closeEffect: 'fade',
      });
      lb.open();
    });
  }

  // ── Inline rename ───────────────────────────────────────────────────────────
  function startRename(folderNumber) {
    const lbl = document.getElementById(`lbl-${folderNumber}`);
    if (!lbl || lbl.dataset.editing) return;
    lbl.dataset.editing = '1';

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'folder-label-input';
    input.value = getFolderName(folderNumber);
    lbl.replaceWith(input);
    input.select();

    function commit() {
      const newName = input.value.trim();
      saveFolderName(folderNumber, newName);
      const span = document.createElement('span');
      span.className = 'folder-label';
      span.id = `lbl-${folderNumber}`;
      span.title = 'Click to rename';
      span.textContent = getFolderName(folderNumber);
      span.addEventListener('click', () => startRename(folderNumber));
      input.replaceWith(span);
    }

    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.value = getFolderName(folderNumber); input.blur(); }
    });
  }

  // ── Image update ────────────────────────────────────────────────────────────
  function updateImage(folderNumber, imagePath, mtime, flash = true) {
    if (!knownFolders[folderNumber]) createCard(folderNumber);

    const img  = document.getElementById(`img-${folderNumber}`);
    const ph   = document.getElementById(`ph-${folderNumber}`);
    const ts   = document.getElementById(`ts-${folderNumber}`);
    const card = document.getElementById(`card-${folderNumber}`);

    // Cache-bust so the browser always fetches the freshest file
    const wrap = document.getElementById(`wrap-${folderNumber}`);
    img.onload = () => {
      const ratio = img.naturalWidth / img.naturalHeight;
      wrap.style.aspectRatio = ratio > (4 / 3) ? `${img.naturalWidth} / ${img.naturalHeight}` : '4 / 3';
      img.style.display = 'block';
      ph.style.display  = 'none';
      wrap.classList.add('has-image');
    };
    img.src = `${imagePath}?t=${Date.now()}`;

    lastUpdateTime[folderNumber] = mtime || Date.now();
    ts.textContent = timeAgo(lastUpdateTime[folderNumber]);

    // Green flash to signal update (live updates only)
    if (flash) {
      card.classList.remove('flash');
      void card.offsetWidth;          // force reflow to re-trigger transition
      card.classList.add('flash');
      setTimeout(() => card.classList.remove('flash'), flashSeconds * 1000);
    }
  }

  // ── Socket.IO ────────────────────────────────────────────────────────────────
  const socket = io();

  socket.on('config', ({ flashSeconds: fs, alertOnly: ao }) => {
    flashSeconds = fs;
    alertOnly    = !!ao;
  });;

  socket.on('connect',       () => setStatus('connected',    'Live'));
  socket.on('disconnect',    () => setStatus('disconnected', 'Disconnected — reconnecting…'));
  socket.on('connect_error', () => setStatus('disconnected', 'Connection error'));

  socket.on('folder', ({ folderNumber }) => {
    if (!knownFolders[folderNumber]) createCard(folderNumber);
  });

  socket.on('init',  ({ folderNumber, imagePath, mtime }) => {
    updateImage(folderNumber, imagePath, mtime, false);
  });

  socket.on('image', ({ folderNumber, imagePath, mtime }) => {
    updateImage(folderNumber, imagePath, mtime, true);
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
</body>
</html>
