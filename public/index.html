<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen Monitor</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous">
  <style>
    :root {
      --card-bg:     #0f172a;
      --card-border: #1e3a5f;
      --header-bg:   #1e293b;
      --flash-color: #22c55e;
    }

    body { background: #020617; }

    .monitor-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color .15s, box-shadow .15s;
    }

    .monitor-card.flash {
      border-color: var(--flash-color);
      box-shadow: 0 0 14px rgba(34,197,94,.35);
    }

    .monitor-card .card-header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--card-border);
      padding: .45rem .75rem;
    }

    .folder-label {
      font-size: .95rem;
      font-weight: 600;
      color: #e2e8f0;
    }

    .ts-label {
      font-size: .68rem;
      color: #64748b;
      font-variant-numeric: tabular-nums;
    }

    /* Fixed 16:9 image area */
    .img-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    .img-wrap .placeholder {
      color: #334155;
      font-size: .8rem;
      user-select: none;
    }

    .filename-label {
      font-size: .65rem;
      color: #475569;
      padding: .25rem .5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: var(--card-bg);
    }

    /* Connection badge */
    #conn-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    #conn-badge.connected    .dot { background: #22c55e; }
    #conn-badge.disconnected .dot { background: #ef4444; }
    #conn-badge.connecting   .dot { background: #f59e0b; }
  </style>
</head>
<body>
<div class="container-fluid py-3 px-4">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <h5 class="text-light mb-0">Screen Monitor</h5>
    <div id="conn-badge" class="connecting d-flex align-items-center text-secondary small">
      <span class="dot"></span>
      <span id="conn-label">Connecting…</span>
    </div>
  </div>

  <!-- Cards are injected here, 3 per row on md+ screens -->
  <div class="row g-3" id="monitor-grid"></div>

</div>

<script>
  'use strict';

  const grid    = document.getElementById('monitor-grid');
  const badge   = document.getElementById('conn-badge');
  const connLbl = document.getElementById('conn-label');

  // folderNumber → true (tracks which cards exist)
  const knownFolders = {};

  // ── Connection status ───────────────────────────────────────────────────────
  function setStatus(state, text) {
    badge.className = `${state} d-flex align-items-center small`;
    badge.classList.add(state === 'connected' ? 'text-success' : state === 'disconnected' ? 'text-danger' : 'text-warning');
    connLbl.textContent = text;
  }

  // ── Card creation ───────────────────────────────────────────────────────────
  function createCard(folderNumber) {
    const col = document.createElement('div');
    col.className = 'col-12 col-md-4';
    col.dataset.folder = folderNumber;
    col.innerHTML = `
      <div class="monitor-card" id="card-${folderNumber}">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span class="folder-label">Folder ${folderNumber}</span>
          <span class="ts-label" id="ts-${folderNumber}">—</span>
        </div>
        <div class="img-wrap" id="wrap-${folderNumber}">
          <img id="img-${folderNumber}" alt="screenshot">
          <span class="placeholder" id="ph-${folderNumber}">No image yet</span>
        </div>
        <div class="filename-label" id="fn-${folderNumber}">&nbsp;</div>
      </div>`;

    // Insert column in ascending numeric order
    const existing = [...grid.querySelectorAll('[data-folder]')];
    const before = existing.find(el => {
      const a = parseInt(el.dataset.folder, 10);
      const b = parseInt(folderNumber, 10);
      return isNaN(a) || isNaN(b) ? el.dataset.folder > folderNumber : a > b;
    });

    before ? grid.insertBefore(col, before) : grid.appendChild(col);
    knownFolders[folderNumber] = true;
  }

  // ── Image update ────────────────────────────────────────────────────────────
  function updateImage(folderNumber, imagePath) {
    if (!knownFolders[folderNumber]) createCard(folderNumber);

    const img  = document.getElementById(`img-${folderNumber}`);
    const ph   = document.getElementById(`ph-${folderNumber}`);
    const ts   = document.getElementById(`ts-${folderNumber}`);
    const fn   = document.getElementById(`fn-${folderNumber}`);
    const card = document.getElementById(`card-${folderNumber}`);

    // Cache-bust so the browser always fetches the freshest file
    img.onload = () => {
      img.style.display = 'block';
      ph.style.display  = 'none';
    };
    img.src = `${imagePath}?t=${Date.now()}`;

    ts.textContent = new Date().toLocaleTimeString();
    fn.textContent = decodeURIComponent(imagePath.split('/').pop());

    // Green flash to signal update
    card.classList.remove('flash');
    void card.offsetWidth;          // force reflow to re-trigger transition
    card.classList.add('flash');
    setTimeout(() => card.classList.remove('flash'), 1500);
  }

  // ── SSE ─────────────────────────────────────────────────────────────────────
  let evtSource;

  function connect() {
    setStatus('connecting', 'Connecting…');
    evtSource = new EventSource('/events');

    evtSource.onopen = () => setStatus('connected', 'Live');

    evtSource.onmessage = (e) => {
      const { folderNumber, imagePath } = JSON.parse(e.data);
      updateImage(folderNumber, imagePath);
    };

    evtSource.onerror = () => {
      setStatus('disconnected', 'Disconnected — retrying…');
      evtSource.close();
      setTimeout(connect, 3000);
    };
  }

  connect();
</script>
</body>
</html>
