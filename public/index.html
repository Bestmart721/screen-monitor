<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screen Monitor</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous">
  <script src="/socket.io/socket.io.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
  <style>
    /* Speed up GLightbox animations */
    .glightbox-container .gslide,
    .glightbox-container .goverlay,
    .glightbox-container .gcontainer {
      animation-duration: 0.15s !important;
      transition-duration: 0.15s !important;
    }
    :root {
      --card-bg:     #0f172a;
      --card-border: #1e3a5f;
      --header-bg:   #1e293b;
      --flash-color: #22c55e;
    }

    body { background: #020617; }

    .monitor-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color .15s, box-shadow .15s;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .monitor-card.flash {
      border-color: var(--flash-color);
      box-shadow: 0 0 14px rgba(34,197,94,.35);
    }

    .monitor-card .card-header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--card-border);
      padding: .45rem .75rem;
    }

    .folder-label {
      font-size: .95rem;
      font-weight: 600;
      color: #e2e8f0;
      cursor: pointer;
      border-radius: 4px;
      padding: 1px 4px;
      transition: background .15s;
    }

    .folder-label:hover {
      background: rgba(255,255,255,.08);
    }

    .folder-label-input {
      font-size: .95rem;
      font-weight: 600;
      color: #e2e8f0;
      background: #0f172a;
      border: 1px solid #3b82f6;
      border-radius: 4px;
      padding: 1px 4px;
      outline: none;
      width: 100%;
      max-width: 220px;
    }

    .ts-label {
      font-size: .8rem;
      font-weight: 600;
      color: #94a3b8;
      font-variant-numeric: tabular-nums;
    }

    /* Fixed 16:9 image area */
    .img-wrap {
      width: 100%;
      flex: 1;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: default;
    }

    .img-wrap.has-image {
      cursor: pointer;
    }

    .img-wrap img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: none;
    }

    .img-wrap .placeholder {
      padding: 2rem 0;
      color: #334155;
      font-size: .8rem;
      user-select: none;
    }

    /* Connection badge */
    #conn-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }

    #conn-badge.connected    .dot { background: #22c55e; }
    #conn-badge.disconnected .dot { background: #ef4444; }
    #conn-badge.connecting   .dot { background: #f59e0b; }
  </style>
</head>
<body>
<div class="container-fluid py-3 px-4">

  <div class="d-flex align-items-center justify-content-between mb-3">
    <h5 class="text-light mb-0">Screen Monitor</h5>
    <div id="conn-badge" class="connecting d-flex align-items-center text-secondary small">
      <span class="dot"></span>
      <span id="conn-label">Connecting…</span>
    </div>
  </div>

  <!-- Cards are injected here, 3 per row on md+ screens -->
  <div class="row g-3" id="monitor-grid"></div>

</div>

<script>
  'use strict';

  const grid    = document.getElementById('monitor-grid');
  const badge   = document.getElementById('conn-badge');
  const connLbl = document.getElementById('conn-label');

  // folderNumber → true (tracks which cards exist)
  const knownFolders = {};

  // folderNumber → Date of last image update
  const lastUpdateTime = {};

  // Configured by server via 'config' event
  let flashSeconds = 5;
  let alertOnly    = false;

  // ── Relative time helper ────────────────────────────────────────────────────
  function timeAgo(date) {
    const secs = Math.floor((Date.now() - date) / 1000);
    if (secs < flashSeconds)  return 'just now';
    if (secs < 60) return `${secs}s ago`;
    const mins = Math.floor(secs / 60);
    if (mins < 60) return `${mins} min ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24)  return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function refreshAllTimestamps() {
    for (const [folderNumber, date] of Object.entries(lastUpdateTime)) {
      const ts = document.getElementById(`ts-${folderNumber}`);
      if (ts) ts.textContent = timeAgo(date);
    }
  }

  setInterval(refreshAllTimestamps, 1_000);

  // ── Folder name map (persisted in localStorage) ─────────────────────────────
  const LS_KEY = 'folderNames';

  function loadFolderNames() {
    try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch { return {}; }
  }

  let folderNames = loadFolderNames();

  function getFolderName(folderNumber) {
    return folderNames[folderNumber] || `Folder ${folderNumber}`;
  }

  function saveFolderName(folderNumber, name) {
    name = name.trim();
    if (name) {
      folderNames[folderNumber] = name;
    } else {
      delete folderNames[folderNumber];
    }
    localStorage.setItem(LS_KEY, JSON.stringify(folderNames));
  }

  // ── Connection status ───────────────────────────────────────────────────────
  function setStatus(state, text) {
    badge.className = `${state} d-flex align-items-center small`;
    badge.classList.add(state === 'connected' ? 'text-success' : state === 'disconnected' ? 'text-danger' : 'text-warning');
    connLbl.textContent = text;
  }

  // ── Card creation ───────────────────────────────────────────────────────────
  function createCard(folderNumber) {
    const col = document.createElement('div');
    col.className = 'col-12 col-md-4';
    col.dataset.folder = folderNumber;
    col.innerHTML = `
      <div class="monitor-card" id="card-${folderNumber}">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span class="folder-label" id="lbl-${folderNumber}" title="Click to rename">${getFolderName(folderNumber)}</span>
          <span class="ts-label" id="ts-${folderNumber}">—</span>
        </div>
        <div class="img-wrap" id="wrap-${folderNumber}">
          <img id="img-${folderNumber}" alt="screenshot">
          <span class="placeholder" id="ph-${folderNumber}">No image yet</span>
        </div>
      </div>`;

    // Insert column in ascending numeric order
    const existing = [...grid.querySelectorAll('[data-folder]')];
    const before = existing.find(el => {
      const a = parseInt(el.dataset.folder, 10);
      const b = parseInt(folderNumber, 10);
      return isNaN(a) || isNaN(b) ? el.dataset.folder > folderNumber : a > b;
    });

    before ? grid.insertBefore(col, before) : grid.appendChild(col);
    knownFolders[folderNumber] = true;

    // Inline rename on click
    const lbl = col.querySelector(`#lbl-${folderNumber}`);
    lbl.addEventListener('click', () => startRename(folderNumber));

    // Image preview on click
    const wrap = col.querySelector(`#wrap-${folderNumber}`);
    wrap.addEventListener('click', () => {
      const imgEl = document.getElementById(`img-${folderNumber}`);
      if (!imgEl || imgEl.style.display === 'none' || !imgEl.src) return;
      const filename = decodeURIComponent(imgEl.src.split('/').pop().split('?')[0]);
      const lb = GLightbox({
        elements: [{
          href: imgEl.src,
          type: 'image',
          title: `<span style="font-size:1.15rem;font-weight:700">${getFolderName(folderNumber)}</span>`,
          description: `<span style="font-size:.8rem;opacity:.7">${filename}</span>`,
        }],
        touchNavigation: true,
        keyboardNavigation: true,
        closeButton: true,
        zoomable: true,
        openEffect: 'zoom',
        closeEffect: 'fade',
      });
      lb.open();
    });
  }

  // ── Inline rename ───────────────────────────────────────────────────────────
  function startRename(folderNumber) {
    const lbl = document.getElementById(`lbl-${folderNumber}`);
    if (!lbl || lbl.dataset.editing) return;
    lbl.dataset.editing = '1';

    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'folder-label-input';
    input.value = getFolderName(folderNumber);
    lbl.replaceWith(input);
    input.select();

    function commit() {
      const newName = input.value.trim();
      saveFolderName(folderNumber, newName);
      const span = document.createElement('span');
      span.className = 'folder-label';
      span.id = `lbl-${folderNumber}`;
      span.title = 'Click to rename';
      span.textContent = getFolderName(folderNumber);
      span.addEventListener('click', () => startRename(folderNumber));
      input.replaceWith(span);
    }

    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
      if (e.key === 'Escape') { input.value = getFolderName(folderNumber); input.blur(); }
    });
  }

  // ── Image update ────────────────────────────────────────────────────────────
  function updateImage(folderNumber, imagePath, mtime, flash = true) {
    if (!knownFolders[folderNumber]) createCard(folderNumber);

    const img  = document.getElementById(`img-${folderNumber}`);
    const ph   = document.getElementById(`ph-${folderNumber}`);
    const ts   = document.getElementById(`ts-${folderNumber}`);
    const card = document.getElementById(`card-${folderNumber}`);

    // Cache-bust so the browser always fetches the freshest file
    const wrap = document.getElementById(`wrap-${folderNumber}`);
    img.onload = () => {
      img.style.display = 'block';
      ph.style.display  = 'none';
      wrap.classList.add('has-image');
    };
    img.src = `${imagePath}?t=${Date.now()}`;

    lastUpdateTime[folderNumber] = mtime || Date.now();
    ts.textContent = timeAgo(lastUpdateTime[folderNumber]);

    // Green flash to signal update (live updates only)
    if (flash) {
      card.classList.remove('flash');
      void card.offsetWidth;          // force reflow to re-trigger transition
      card.classList.add('flash');
      setTimeout(() => card.classList.remove('flash'), flashSeconds * 1000);
    }
  }

  // ── Socket.IO ────────────────────────────────────────────────────────────────
  const socket = io();

  socket.on('config', ({ flashSeconds: fs, alertOnly: ao }) => {
    flashSeconds = fs;
    alertOnly    = !!ao;
  });;

  socket.on('connect',       () => setStatus('connected',    'Live'));
  socket.on('disconnect',    () => setStatus('disconnected', 'Disconnected — reconnecting…'));
  socket.on('connect_error', () => setStatus('disconnected', 'Connection error'));

  socket.on('init',  ({ folderNumber, imagePath, mtime }) => {
    updateImage(folderNumber, imagePath, mtime, false);
  });

  socket.on('image', ({ folderNumber, imagePath, mtime }) => {
    updateImage(folderNumber, imagePath, mtime, true);
  });
</script>
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
</body>
</html>
